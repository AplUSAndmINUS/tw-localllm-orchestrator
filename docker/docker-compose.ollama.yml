version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aplus-ollama
    restart: unless-stopped
    ports:
      - "${APLUS_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  ollama_models:
