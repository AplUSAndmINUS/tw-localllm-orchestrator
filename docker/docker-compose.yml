version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aplus-ollama
    restart: "no"
    ports:
      - "${APLUS_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      # The official image no longer ships curl; the ollama CLI itself talks
      # to the local server and doubles as a liveness check.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - aplus

  xtts:
    image: ghcr.io/coqui-ai/xtts-streaming-server:latest-cuda121
    container_name: aplus-xtts
    restart: "no"
    environment:
      - COQUI_TOS_AGREED=1
    ports:
      - "${APLUS_XTTS_PORT:-5002}:80"
    volumes:
      - xtts_data:/root/.local/share/tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/languages"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - aplus

  onnx-runtime:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: aplus-onnx
    restart: "no"
    command: ["--model-id", "sentence-transformers/all-MiniLM-L6-v2"]
    ports:
      - "${APLUS_ONNX_PORT:-8001}:80"
    volumes:
      - onnx_models:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - aplus

  chromadb:
    image: chromadb/chroma:latest
    container_name: aplus-chromadb
    restart: "no"
    ports:
      - "${APLUS_CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      # This image ships neither curl nor wget; bash's /dev/tcp is the only
      # thing available to speak HTTP (default /bin/sh is dash and lacks it).
      # The v1 API is deprecated server-side too, hence /api/v2.
      test: ["CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/localhost/8000; printf 'GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; head -1 <&3 | grep -q '200 OK'\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - aplus

volumes:
  ollama_models:
  xtts_data:
  onnx_models:
  chromadb_data:

networks:
  aplus:
    driver: bridge
