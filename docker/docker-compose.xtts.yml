version: "3.9"

services:
  xtts:
    image: ghcr.io/coqui-ai/xtts-streaming-server:latest-cpu
    container_name: aplus-xtts
    restart: unless-stopped
    environment:
      - COQUI_TOS_AGREED=1
    ports:
      - "${APLUS_XTTS_PORT:-5002}:80"
    volumes:
      - xtts_data:/app/tts_models

volumes:
  xtts_data:
