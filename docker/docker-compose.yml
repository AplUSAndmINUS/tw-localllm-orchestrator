version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aplus-ollama
    restart: "no"
    ports:
      - "${APLUS_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - aplus

  xtts:
    image: ghcr.io/coqui-ai/xtts-streaming-server:latest-cuda121
    container_name: aplus-xtts
    restart: "no"
    environment:
      - COQUI_TOS_AGREED=1
    ports:
      - "${APLUS_XTTS_PORT:-5002}:80"
    volumes:
      - xtts_data:/root/.local/share/tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/languages"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - aplus

  onnx-runtime:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: aplus-onnx
    restart: "no"
    command: ["--model-id", "sentence-transformers/all-MiniLM-L6-v2"]
    ports:
      - "${APLUS_ONNX_PORT:-8001}:80"
    volumes:
      - onnx_models:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - aplus

  chromadb:
    image: chromadb/chroma:latest
    container_name: aplus-chromadb
    restart: "no"
    ports:
      - "${APLUS_CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - aplus

volumes:
  ollama_models:
  xtts_data:
  onnx_models:
  chromadb_data:

networks:
  aplus:
    driver: bridge
