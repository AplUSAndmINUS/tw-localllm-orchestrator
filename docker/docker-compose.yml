version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aplus-ollama
    restart: unless-stopped
    ports:
      - "${APLUS_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - aplus

  xtts:
    image: ghcr.io/coqui-ai/xtts:latest
    container_name: aplus-xtts
    restart: unless-stopped
    ports:
      - "${APLUS_XTTS_PORT:-5002}:5002"
    volumes:
      - xtts_data:/data
      - ./config/voices:/app/voices:ro
    networks:
      - aplus

  onnx-runtime:
    image: mcr.microsoft.com/onnxruntime/server:latest
    container_name: aplus-onnx
    restart: unless-stopped
    ports:
      - "${APLUS_ONNX_PORT:-8001}:8001"
    volumes:
      - onnx_models:/models
    networks:
      - aplus

  chromadb:
    image: chromadb/chroma:latest
    container_name: aplus-chromadb
    restart: unless-stopped
    ports:
      - "${APLUS_CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - aplus

volumes:
  ollama_models:
  xtts_data:
  onnx_models:
  chromadb_data:

networks:
  aplus:
    driver: bridge
