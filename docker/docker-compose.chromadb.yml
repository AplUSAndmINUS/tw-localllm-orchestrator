version: "3.9"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: aplus-chromadb
    restart: unless-stopped
    ports:
      - "${APLUS_CHROMADB_PORT:-8000}:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  chromadb_data:
